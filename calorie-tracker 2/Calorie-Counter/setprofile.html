<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Setup - CalorieCounter</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page gradient-bg">
    <div class="auth-container">
      <div class="auth-card profile-card">
        <div class="auth-header">
          <div class="logo">
            <svg class="logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
            <span class="logo-text">CalorieCounter</span>
          </div>
          <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </div>

        <h2>Complete Your Profile</h2>
        <p class="auth-subtitle">Tell us about yourself to calculate your calorie goals</p>

        <form id="profileForm" class="auth-form">
          <div class="form-row">
            <div class="form-group">
              <label for="age">Age</label>
              <input type="number" id="age" name="age" required min="13" max="120">
            </div>

            <div class="form-group">
              <label for="gender">Gender</label>
              <select id="gender" name="gender" required>
                <option value="">Select...</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="height">Height (cm)</label>
              <input type="number" id="height" name="height" required min="100" max="250">
            </div>

            <div class="form-group">
              <label for="weight">Weight (kg)</label>
              <input type="number" id="weight" name="weight" required min="30" max="300" step="0.1">
            </div>
          </div>

          <div class="form-group">
            <label for="activityLevel">Activity Level</label>
            <select id="activityLevel" name="activityLevel" required>
              <option value="">Select...</option>
              <option value="1.2">Sedentary (little or no exercise)</option>
              <option value="1.375">Lightly active (1-3 days/week)</option>
              <option value="1.55">Moderately active (3-5 days/week)</option>
              <option value="1.725">Very active (6-7 days/week)</option>
              <option value="1.9">Super active (intense exercise daily)</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary btn-full">Continue to Dashboard</button>
        </form>
      </div>
    </div>
  </div>

</body>
</html>
